name: CI - Notification Service

on:
  pull_request:
    branches: [master]
    paths:
      - src/services/notifications/**
      - .github/workflows/notification-service.yml

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Format and vet
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: src/services/notifications

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: src/services/notifications/go.mod
          cache: false

      - name: Format check
        shell: bash
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            printf '%s\n' "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...
