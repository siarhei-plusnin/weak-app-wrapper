name: CI - Data Processor

on:
  pull_request:
    branches: [master]
    paths:
      - src/services/WeakAppWrapper.Processor/**
      - src/shared/**
      - Directory.Build.props
      - Directory.Packages.props
      - .editorconfig
      - .github/workflows/data-processor.yml

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Restore, format, and build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/services/WeakAppWrapper.Processor/WeakAppWrapper.Processor.csproj

      - name: Format check
        run: dotnet format src/services/WeakAppWrapper.Processor/WeakAppWrapper.Processor.csproj --verify-no-changes --no-restore

      - name: Build
        run: dotnet build src/services/WeakAppWrapper.Processor/WeakAppWrapper.Processor.csproj --configuration Release --no-restore
