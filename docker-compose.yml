services:
  kafka:
    image: apache/kafka:4.3.0
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    restart: unless-stopped

  kafka-ui:
    image: kafbat/kafka-ui:v1.5.0
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: weakapp
      POSTGRES_USER: weakapp
      POSTGRES_PASSWORD: weakapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weakapp -d weakapp"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  weakapp:
    build:
      context: ./vendor/WeakApp
      dockerfile: Dockerfile
    image: weakapp-api:local
    container_name: weakapp-api
    environment:
      ASPNETCORE_URLS: http://+:8080
    expose:
      - "8080"
    restart: unless-stopped

  data-ingestor:
    build:
      context: .
      dockerfile: src/services/WeakAppWrapper.Ingestor/Dockerfile
    image: data-ingestor:local
    container_name: data-ingestor
    environment:
      DOTNET_ENVIRONMENT: Development
      WeakApp__BaseUrl: http://weakapp:8080
      WeakApp__ApiKey: ${WEAKAPP_API_KEY:?WEAKAPP_API_KEY is required}
      Kafka__BootstrapServers: kafka:9092
      Kafka__Topic: weakapp.meters.raw
      Kafka__ClientId: data-ingestor
      Ingestor__PollIntervalSeconds: 30
    depends_on:
      - weakapp
      - kafka
    restart: unless-stopped

  data-processor:
    build:
      context: .
      dockerfile: src/services/WeakAppWrapper.Processor/Dockerfile
    image: data-processor:local
    container_name: data-processor
    environment:
      DOTNET_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=weakapp;Username=weakapp;Password=weakapp
      Kafka__BootstrapServers: kafka:9092
      Kafka__RawTopic: weakapp.meters.raw
      Kafka__RawDeadLetterTopic: weakapp.meters.raw.dlq
      Kafka__ProcessedTopic: readings.processed
      Kafka__ConsumerGroup: data-processor
      Kafka__ConsumerName: weakapp-meters-processor
      Kafka__ClientId: data-processor
      Kafka__WorkersCount: 1
      Kafka__BufferSize: 100
      Outbox__PollIntervalSeconds: 2
      Outbox__BatchSize: 50
    depends_on:
      kafka:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web-api:
    build:
      context: .
      dockerfile: src/services/WeakAppWrapper.WebApi/Dockerfile
    image: web-api:local
    container_name: web-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 8080
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: true
    expose:
      - "8080"
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: src/services/notifications/Dockerfile
    image: notification-service:local
    container_name: notification-service
    expose:
      - "8080"

  reverse-proxy:
    image: caddy:2-alpine
    container_name: reverse-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web-api
      - notification-service
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
