services:
  weakapp:
    build:
      context: ./vendor/WeakApp
      dockerfile: Dockerfile
    image: weakapp-api:local
    container_name: weakapp-api
    environment:
      ASPNETCORE_URLS: http://+:8080
    expose:
      - "8080"
    restart: unless-stopped

  data-ingestor:
    build:
      context: .
      dockerfile: src/services/WeakAppWrapper.Ingestor/Dockerfile
    image: data-ingestor:local
    container_name: data-ingestor
    environment:
      DOTNET_ENVIRONMENT: Development
      WeakApp__BaseUrl: http://weakapp:8080
      WeakApp__ApiKey: ${WEAKAPP_API_KEY:?WEAKAPP_API_KEY is required}
      Kafka__BootstrapServers: kafka:9092
      Kafka__Topic: weakapp.meters.raw
      Kafka__ClientId: data-ingestor
      Ingestor__PollIntervalSeconds: 30
    depends_on:
      - weakapp
    restart: unless-stopped

  data-processor:
    build:
      context: .
      dockerfile: src/services/WeakAppWrapper.Processor/Dockerfile
    image: data-processor:local
    container_name: data-processor
    environment:
      DOTNET_ENVIRONMENT: Development
    restart: unless-stopped

  web-api:
    build:
      context: .
      dockerfile: src/services/WeakAppWrapper.WebApi/Dockerfile
    image: web-api:local
    container_name: web-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 8080
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: true
    expose:
      - "8080"
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: src/services/notifications/Dockerfile
    image: notification-service:local
    container_name: notification-service
    expose:
      - "8080"

  reverse-proxy:
    image: caddy:2-alpine
    container_name: reverse-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web-api
      - notification-service
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
